<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1600" height="1100" viewBox="0 0 1600 1100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#1f2937"/>
    </marker>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 600 18px Arial, sans-serif; fill: #374151; }
      .label { font: 600 15px Arial, sans-serif; fill: #111827; }
      .small { font: 500 13px Arial, sans-serif; fill: #111827; }
      .tiny { font: 500 12px Arial, sans-serif; fill: #374151; }
      .obj { fill: none; stroke: #111827; stroke-width: 2; }
      .hidden { fill: none; stroke: #6b7280; stroke-width: 1.5; stroke-dasharray: 6 4; }
      .dim { fill: none; stroke: #1f2937; stroke-width: 1.5; marker-start: url(#arrow); marker-end: url(#arrow); }
      .ext { fill: none; stroke: #4b5563; stroke-width: 1; }
      .center { fill: none; stroke: #6b7280; stroke-width: 1; stroke-dasharray: 3 3; }
      .cut { fill: #f9fafb; stroke: #111827; stroke-width: 1.5; }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="1100" fill="#ffffff"/>
  <text x="30" y="45" class="title">Leaf Capture Box v1 (Phone-Top, Tray-Slide) - CAD Style Layout</text>
  <text x="30" y="72" class="subtitle">Units: mm | Material: 5 mm foam board | Drawing date: 2026-04-25</text>

  <!-- TOP VIEW -->
  <text x="70" y="130" class="subtitle">TOP VIEW</text>
  <!-- Outer box: 380 x 280 -->
  <rect x="70" y="150" width="570" height="420" class="obj"/>
  <!-- Inner active tray area: 360 x 260 -->
  <rect x="85" y="165" width="540" height="390" class="hidden"/>
  <text x="235" y="360" class="label">Active Tray Area 360 x 260</text>

  <!-- Camera opening 90 x 90 centered -->
  <rect x="310" y="315" width="90" height="90" class="obj"/>
  <line x1="355" y1="250" x2="355" y2="470" class="center"/>
  <line x1="245" y1="360" x2="465" y2="360" class="center"/>
  <text x="288" y="305" class="small">Phone/Camera Hole 90 x 90</text>

  <!-- Aruco corner zones -->
  <rect x="90" y="180" width="36" height="36" class="obj"/>
  <rect x="584" y="180" width="36" height="36" class="obj"/>
  <rect x="90" y="504" width="36" height="36" class="obj"/>
  <rect x="584" y="504" width="36" height="36" class="obj"/>
  <text x="132" y="202" class="tiny">ArUco</text>
  <text x="542" y="202" class="tiny">ArUco</text>
  <text x="132" y="528" class="tiny">ArUco</text>
  <text x="542" y="528" class="tiny">ArUco</text>

  <!-- Scale strip -->
  <rect x="85" y="530" width="540" height="25" class="hidden"/>
  <text x="245" y="548" class="tiny">Scale Strip 20 mm</text>

  <!-- Top view dimensions -->
  <line x1="70" y1="590" x2="640" y2="590" class="ext"/>
  <line x1="70" y1="620" x2="640" y2="620" class="dim"/>
  <text x="325" y="614" class="label">380</text>
  <line x1="660" y1="150" x2="660" y2="570" class="ext"/>
  <line x1="690" y1="150" x2="690" y2="570" class="dim"/>
  <text x="700" y="365" class="label">280</text>

  <!-- FRONT VIEW -->
  <text x="780" y="130" class="subtitle">FRONT VIEW</text>
  <!-- Body -->
  <rect x="780" y="150" width="570" height="330" class="obj"/>
  <!-- Tray plane -->
  <line x1="780" y1="430" x2="1350" y2="430" class="obj"/>
  <text x="1000" y="423" class="small">Sliding Tray Plane</text>

  <!-- Top opening center -->
  <rect x="1020" y="150" width="90" height="35" class="obj"/>
  <text x="960" y="145" class="small">Top opening (90 wide)</text>

  <!-- Extension collar -->
  <rect x="780" y="90" width="570" height="60" class="hidden"/>
  <text x="960" y="82" class="small">Optional Extension Collar +120 (Large Mode)</text>

  <!-- Front dimensions -->
  <line x1="780" y1="510" x2="1350" y2="510" class="ext"/>
  <line x1="780" y1="540" x2="1350" y2="540" class="dim"/>
  <text x="1045" y="534" class="label">380</text>

  <line x1="1380" y1="150" x2="1380" y2="480" class="ext"/>
  <line x1="1410" y1="150" x2="1410" y2="480" class="dim"/>
  <text x="1420" y="325" class="label">220 (box wall)</text>

  <line x1="1450" y1="90" x2="1450" y2="480" class="ext"/>
  <line x1="1480" y1="90" x2="1480" y2="480" class="dim"/>
  <text x="1490" y="300" class="label">340 (with collar)</text>

  <!-- SIDE VIEW -->
  <text x="780" y="640" class="subtitle">SIDE VIEW</text>
  <rect x="780" y="660" width="420" height="330" class="obj"/>
  <line x1="780" y1="940" x2="1200" y2="940" class="obj"/>
  <text x="905" y="933" class="small">Sliding Tray Plane</text>

  <!-- Phone + clamp indicator -->
  <rect x="930" y="605" width="120" height="45" class="hidden"/>
  <line x1="990" y1="650" x2="990" y2="700" class="center"/>
  <text x="922" y="598" class="small">Phone clamp zone</text>
  <text x="890" y="710" class="small">Camera axis</text>

  <!-- Distances lens to tray -->
  <line x1="1240" y1="700" x2="1240" y2="940" class="ext"/>
  <line x1="1270" y1="700" x2="1270" y2="940" class="dim"/>
  <text x="1280" y="825" class="label">240 (Small Mode)</text>

  <line x1="1310" y1="580" x2="1310" y2="940" class="ext"/>
  <line x1="1340" y1="580" x2="1340" y2="940" class="dim"/>
  <text x="1350" y="770" class="label">360 (Large Mode)</text>

  <!-- side width dimension -->
  <line x1="780" y1="1020" x2="1200" y2="1020" class="ext"/>
  <line x1="780" y1="1050" x2="1200" y2="1050" class="dim"/>
  <text x="975" y="1044" class="label">280</text>

  <!-- CUT LIST -->
  <text x="60" y="700" class="subtitle">CUT LIST (5 mm board, v1)</text>
  <rect x="60" y="720" width="620" height="320" class="cut"/>
  <text x="80" y="755" class="label">1) Base panel: 380 x 280 (qty 1)</text>
  <text x="80" y="785" class="label">2) Side walls: 220 x 280 (qty 2)</text>
  <text x="80" y="815" class="label">3) Front/Back walls: 220 x 370 (qty 2)</text>
  <text x="80" y="845" class="label">4) Top plate: 380 x 280 with center hole 90 x 90 (qty 1)</text>
  <text x="80" y="875" class="label">5) Tray: 360 x 260 (qty 1)</text>
  <text x="80" y="905" class="label">6) Extension collar walls: 120 x 280 (qty 2), 120 x 370 (qty 2)</text>
  <text x="80" y="935" class="small">Note: 370 = 380 - 2*(wall thickness 5 mm)</text>
  <text x="80" y="960" class="small">Use matte black interior finish to reduce reflections.</text>
  <text x="80" y="985" class="small">Add tray detent stops for 2x2 tile capture (30-40% overlap).</text>
  <text x="80" y="1010" class="small">Add marker zones in 4 corners on tray for geometric stitching.</text>

  <text x="30" y="1085" class="tiny">Leaf Box CAD v1 - conceptual fabrication drawing (not a certified manufacturing print)</text>
</svg>
